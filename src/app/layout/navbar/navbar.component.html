<header class="header-area header-sticky fixed-top shadow-sm ">
    <div [class]="'header-area header header-sticky d-none d-lg-block ' + headerArea" id="header">
        <div [ngClass]="{'container-fluid': container, 'container': !container}">
            <div class="row">
                <div class="col-lg-12">
                    <div [class]="'header-elements ' + headerElement">
                        <div class="site-logo">
                            <a routerLink="/accueil">
                <img *ngIf="logoImage; else defaultLogo" [src]="logoImage" alt="Logo" height="50" />
                <ng-template #defaultLogo>InfoTech</ng-template>
                            </a>
                        </div>
                        <div [class]="'main-menu ' + menuClass">
                            <ul>
                                <li routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
                                    <a routerLink="/accueil">Accueil</a>
                                   
                                </li>
                                <li routerLinkActive="active"><a routerLink="/a_propos">A propos</a></li>
                                <li routerLinkActive="active">
                                    <a href="/event">Evènement </a>
                                </li>
                                <li routerLinkActive="active">
                                    <a href="/blog">Blogs</a>
                                </li>

                                <li routerLinkActive="active">
                                    <a href="/contact">Contact</a>
                                </li>
                              
                            </ul>
                        </div>
                        <div [class]="btnParent">
                            <!-- <a [routerLink]="link" [ngClass]="btnClass">
                                {{ label }}
                                <span><i [ngClass]="icon"></i></span>
                            </a> -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
