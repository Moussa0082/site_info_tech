<div class="vl-sidebar-area sp2" *ngIf="ev">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto">
        <div class="vl-event-content-area">
          <div class="vl-large-thumb mb-4">
            <img
              class="w-100 rounded shadow"
              *ngIf="ev?.image"
              [src]="getImageUrl(ev.image)"
              alt="{{ ev?.titre }}"
              (error)="handleImageError($event)"
            />
          </div>

          <div class="vl-event-header mb-4">
            <span class="badge badge-primary mb-2">{{ ev.categorie.nom }}</span>
            <h2 class="title h1">{{ ev.titre }}</h2>

            <div
              class="event-meta-info d-flex flex-wrap mt-3 border-bottom border-top py-3"
              style="gap: 25px 40px"
            >
              <div class="mr-6 mb-2">
                <i class="fas fa-calendar-alt text-danger mr-4"></i>
                <strong>Début :</strong>
                {{ ev.dateDebutEvent | date : "dd MMM yyyy, HH:mm" }}
              </div>
              <div class="mr-6 mb-2">
                <i class="fas fa-clock text-danger mr-2"></i>
                <strong>Fin :</strong>
                {{ ev.dateFinEvent | date : "dd MMM yyyy, HH:mm" }}
              </div>
              <div class="mr-6 mb-2">
                <i class="fas fa-map-marker-alt text-danger mr-4"></i>
                <strong>Lieu :</strong> {{ ev.lieu }}
              </div>
              <div class="mb-2">
                <i class="fas fa-user-tie text-danger mr-2"></i>
                <strong>Organisé par :</strong> {{ ev.organisateur }}
              </div>
            </div>
          </div>

          <div class="vl-event-description mt-4">
            <h4 class="mb-3">À propos de cet événement</h4>
            <p class="para text-justify" style="white-space: pre-line">
              {{ ev.description }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
